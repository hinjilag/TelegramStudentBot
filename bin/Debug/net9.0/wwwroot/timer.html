<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Lo-fi Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Цветовые темы ─────────────────────────────────────────── */
    :root {
      --bg:        #1a1028;
      --bg2:       #251535;
      --ring:      #e8a05e;
      --ring-dim:  rgba(232,160,94,0.15);
      --glow:      rgba(232,160,94,0.45);
      --text:      #f2dbb0;
      --text-dim:  rgba(242,219,176,0.4);
      --bar:       rgba(255,255,255,0.06);
      --done-icon: "✅";
    }
    .rest {
      --bg:        #0c1b27;
      --bg2:       #102030;
      --ring:      #7ec8e3;
      --ring-dim:  rgba(126,200,227,0.12);
      --glow:      rgba(126,200,227,0.45);
      --text:      #b8e4d4;
      --text-dim:  rgba(184,228,212,0.4);
    }

    /* ── Основа ─────────────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 40%, var(--bg2) 0%, var(--bg) 70%);
      color: var(--text);
      font-family: 'VT323', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.8s;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Скан-линии (ретро CRT) ─────────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* ── Звёзды ─────────────────────────────────────────────────── */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--text);
      animation: twinkle var(--d, 3s) ease-in-out var(--dl, 0s) infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0.8); }
      50%      { opacity: var(--op, 0.6); transform: scale(1.2); }
    }

    /* ── Плавающие частицы ──────────────────────────────────────── */
    .particle {
      position: fixed;
      font-size: 18px;
      opacity: 0;
      animation: float-up var(--dur, 6s) ease-in var(--dl2, 0s) infinite;
      pointer-events: none;
    }
    @keyframes float-up {
      0%   { opacity: 0;   transform: translateY(0) rotate(0deg); }
      15%  { opacity: 0.5; }
      85%  { opacity: 0.3; }
      100% { opacity: 0;   transform: translateY(-120px) rotate(20deg); }
    }

    /* ── Иконка режима ──────────────────────────────────────────── */
    #modeIcon {
      font-size: 38px;
      margin-bottom: 10px;
      animation: bob 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 12px var(--glow));
    }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-7px); }
    }

    /* ── Подпись ────────────────────────────────────────────────── */
    #modeLabel {
      font-size: 15px;
      letter-spacing: 5px;
      color: var(--text-dim);
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    /* ── SVG кольцо ─────────────────────────────────────────────── */
    .ring-wrap {
      position: relative;
      width: 230px; height: 230px;
      margin-bottom: 24px;
    }
    svg.ring {
      width: 230px; height: 230px;
      transform: rotate(-90deg);
      overflow: visible;
    }
    .ring-bg {
      fill: none;
      stroke: var(--ring-dim);
      stroke-width: 10;
    }
    .ring-progress {
      fill: none;
      stroke: var(--ring);
      stroke-width: 10;
      stroke-linecap: round;
      filter: drop-shadow(0 0 10px var(--glow));
      transition: stroke-dashoffset 0.9s linear;
    }
    /* пульсирующее кольцо-глоу вокруг прогресса */
    .ring-glow {
      fill: none;
      stroke: var(--ring);
      stroke-width: 18;
      stroke-linecap: round;
      opacity: 0.08;
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { opacity: 0.06; stroke-width: 16; }
      50%      { opacity: 0.14; stroke-width: 22; }
    }

    /* ── Цифры в центре ─────────────────────────────────────────── */
    .center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #timeDigits {
      font-size: 58px;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 24px var(--glow);
      letter-spacing: 2px;
    }
    #timeSubLabel {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-dim);
      margin-top: 6px;
      text-transform: uppercase;
    }

    /* ── Тонкая полоска прогресса ───────────────────────────────── */
    .bar-wrap {
      width: 210px; height: 4px;
      background: var(--bar);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    #progressBar {
      height: 100%;
      background: var(--ring);
      box-shadow: 0 0 8px var(--glow);
      border-radius: 2px;
      transition: width 0.9s linear;
      width: 100%;
    }

    /* ── Мотивационный текст ────────────────────────────────────── */
    #motiveLine {
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 1px;
      min-height: 20px;
      transition: opacity 0.4s;
    }

    /* ── Экран завершения ───────────────────────────────────────── */
    #doneScreen {
      display: none;
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, var(--bg2), var(--bg) 80%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      animation: fadeIn 0.6s ease;
      z-index: 20;
    }
    #doneScreen.show { display: flex; }
    #doneEmoji  { font-size: 72px; animation: pop 0.5s cubic-bezier(0.17,0.89,0.32,1.28) both; }
    #doneTitle  { font-size: 28px; letter-spacing: 3px; text-shadow: 0 0 20px var(--glow); }
    #doneSubtitle { font-size: 16px; color: var(--text-dim); letter-spacing: 2px; }

    /* кольца разлёта */
    .burst-ring {
      position: fixed;
      width: 10px; height: 10px;
      border: 2px solid var(--ring);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: burst var(--bd,1.2s) ease-out var(--bdl,0s) both;
    }
    @keyframes burst {
      from { width:10px; height:10px; opacity:0.8; }
      to   { width:300px; height:300px; opacity:0; }
    }

    /* ── Кнопка музыки ─────────────────────────────────────────── */
    #musicBtn {
      position: fixed;
      top: 14px; right: 14px;
      background: var(--bar);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-dim);
      font-size: 18px;
      width: 38px; height: 38px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 15;
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    #musicBtn:active { transform: scale(0.88); }
    #musicBtn.active {
      color: var(--text);
      border-color: var(--ring);
      box-shadow: 0 0 12px var(--glow);
    }

    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pop {
      0%   { transform: scale(0) rotate(-10deg); opacity:0; }
      70%  { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0); opacity:1; }
    }
  </style>
</head>
<body>

  <!-- Кнопка музыки -->
  <button id="musicBtn" onclick="toggleMusic()" title="Lo-fi музыка">🎵</button>

  <!-- Звёзды -->
  <div id="stars"></div>

  <!-- Плавающие частицы (эмодзи) -->

  <!-- Иконка режима -->
  <div id="modeIcon">📚</div>

  <!-- Подпись -->
  <div id="modeLabel">FOCUS TIME</div>

  <!-- Кольцо -->
  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 230 230">
      <!-- Треки -->
      <circle class="ring-bg"       cx="115" cy="115" r="100"/>
      <!-- Глоу-слой (позади прогресса) -->
      <circle class="ring-glow"     cx="115" cy="115" r="100"
        stroke-dasharray="628.3"  stroke-dashoffset="0" id="ringGlow"/>
      <!-- Прогресс -->
      <circle class="ring-progress" cx="115" cy="115" r="100"
        stroke-dasharray="628.3"  stroke-dashoffset="0" id="ringProg"/>
    </svg>
    <!-- Цифры в центре -->
    <div class="center">
      <div id="timeDigits">00:00</div>
      <div id="timeSubLabel">осталось</div>
    </div>
  </div>

  <!-- Полоска -->
  <div class="bar-wrap">
    <div id="progressBar"></div>
  </div>

  <!-- Мотивация -->
  <div id="motiveLine"></div>

  <!-- Экран завершения -->
  <div id="doneScreen">
    <div id="doneEmoji">✅</div>
    <div id="doneTitle">ГОТОВО!</div>
    <div id="doneSubtitle" id="doneSubtitle"></div>
  </div>

<script>
  /* ─── Telegram WebApp ──────────────────────────────────────── */
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.disableClosingConfirmation(); }

  /* ─── Параметры из URL ─────────────────────────────────────── */
  const params   = new URLSearchParams(location.search);
  const TYPE     = params.get('type')     || 'work';        // work | rest
  const DURATION = parseInt(params.get('duration') || '1500'); // секунды
  const STARTED  = parseInt(params.get('started')  || Date.now()); // ms

  const isRest = TYPE === 'rest';
  const CIRC   = 628.3;  // 2π × 100

  /* ─── Применяем тему ───────────────────────────────────────── */
  if (isRest) {
    document.body.classList.add('rest');
    document.getElementById('modeIcon').textContent     = '☕';
    document.getElementById('modeLabel').textContent    = 'REST  TIME';
    document.getElementById('doneEmoji').textContent    = '🌟';
    document.getElementById('doneTitle').textContent    = 'ОТДЫХ ЗАВЕРШЁН!';
    document.getElementById('doneSubtitle').textContent = 'ВРЕМЯ УЧИТЬСЯ 💪';
    if (tg) tg.setHeaderColor('#0c1b27');
  } else {
    document.getElementById('doneSubtitle').textContent = 'ОТЛИЧНАЯ РАБОТА 🎉';
    if (tg) tg.setHeaderColor('#1a1028');
  }

  /* ─── Мотивационные фразы ──────────────────────────────────── */
  const workPhrases = [
    'сосредоточься 🎯', 'ты справишься! ✨', 'без отвлечений 🔕',
    'в потоке 🌊', 'deep work 🧠', 'one step at a time 🚶'
  ];
  const restPhrases = [
    'отдыхай 🛋', 'отойди от экрана 👁', 'выпей воды 💧',
    'потянись 🧘', 'подыши 🌿', 'ты молодец! ⭐'
  ];
  const phrases = isRest ? restPhrases : workPhrases;
  let phraseIdx = 0;
  const motiveEl = document.getElementById('motiveLine');
  function rotatePhrases() {
    motiveEl.style.opacity = 0;
    setTimeout(() => {
      motiveEl.textContent   = phrases[phraseIdx % phrases.length];
      motiveEl.style.opacity = 1;
      phraseIdx++;
    }, 400);
  }
  rotatePhrases();
  setInterval(rotatePhrases, 7000);

  /* ─── Генерируем звёзды ────────────────────────────────────── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const s   = document.createElement('div');
    s.className = 'star';
    const sz  = Math.random() * 2.5 + 0.5;
    s.style.cssText =
      `width:${sz}px;height:${sz}px;` +
      `left:${Math.random()*100}%;top:${Math.random()*100}%;` +
      `--d:${2+Math.random()*5}s;--dl:${Math.random()*6}s;` +
      `--op:${0.25+Math.random()*0.65};`;
    starsEl.appendChild(s);
  }

  /* ─── Плавающие частицы ─────────────────────────────────────── */
  const PARTICLES = isRest ? ['💤','🌙','✨','☕','🍃'] : ['📖','✏️','⭐','🔥','💡'];
  PARTICLES.forEach((ch, i) => {
    const p = document.createElement('div');
    p.className   = 'particle';
    p.textContent = ch;
    p.style.cssText =
      `left:${10+i*18}%;bottom:${-5+Math.random()*10}%;` +
      `--dur:${7+Math.random()*5}s;--dl2:${i*1.2}s;`;
    document.body.appendChild(p);
  });

  /* ─── Форматирование времени ────────────────────────────────── */
  function fmt(sec) {
    const total = Math.floor(Math.abs(sec));
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60).toString().padStart(2, '0');
    const s = (total % 60).toString().padStart(2, '0');
    return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
  }

  /* ─── Основной цикл обновления ──────────────────────────────── */
  const ringEl = document.getElementById('ringProg');
  const ringGl = document.getElementById('ringGlow');
  const timeEl = document.getElementById('timeDigits');
  const barEl  = document.getElementById('progressBar');
  let finished = false;

  function tick() {
    if (finished) return;

    const elapsed   = (Date.now() - STARTED) / 1000;
    const remaining = Math.max(0, DURATION - elapsed);
    const progress  = remaining / DURATION;  // 1 → 0

    timeEl.textContent = fmt(remaining);

    // SVG ring: offset = CIRC × (1-progress) → пустеет
    const offset = CIRC * (1 - progress);
    ringEl.style.strokeDashoffset = offset;
    ringGl.style.strokeDashoffset = offset;

    // Полоска
    barEl.style.width = (progress * 100) + '%';

    if (remaining <= 0) {
      finished = true;
      showDone();
      return;
    }
    requestAnimationFrame(tick);
  }

  /* ─── Завершение ────────────────────────────────────────────── */
  function showDone() {
    // Плавно выключаем музыку
    if (musicOn) {
      stopLofi();
      const btn = document.getElementById('musicBtn');
      btn.textContent = '🎵';
      btn.classList.remove('active');
    }

    const screen = document.getElementById('doneScreen');
    screen.classList.add('show');

    // Кольца разлёта
    for (let i = 0; i < 4; i++) {
      const r = document.createElement('div');
      r.className = 'burst-ring';
      r.style.cssText = `--bd:${1.2+i*0.3}s;--bdl:${i*0.15}s;`;
      screen.appendChild(r);
    }

    // Отправляем данные в бот
    if (tg) {
      setTimeout(() => {
        tg.sendData(JSON.stringify({ type: TYPE, done: true }));
      }, 2000);
    }
  }

  /* ─── Lo-fi аудио (HTML5 Audio) ───────────────────────────── */
  // Файл lofi.mp3 должен лежать рядом с timer.html на GitHub Pages
  let musicOn = false;
  const audio = new Audio('./lofi.mp3');
  audio.loop   = true;
  audio.volume = 0.45;

  function toggleMusic() {
    const btn = document.getElementById('musicBtn');
    if (musicOn) {
      audio.pause();
      musicOn = false;
      btn.textContent = '🎵';
      btn.classList.remove('active');
    } else {
      audio.play().then(() => {
        musicOn = true;
        btn.textContent = '🔇';
        btn.classList.add('active');
      }).catch(() => {
        btn.textContent = '🎵';
        btn.classList.remove('active');
      });
    }
  }

  function stopLofi() {
    if (musicOn) {
      audio.pause();
      audio.currentTime = 0;
      musicOn = false;
    }
  }

  /* ─── Старт ─────────────────────────────────────────────────── */
  tick();
</script>
</body>
</html>
