<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070816">
  <title>assisKent Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/miniapp/styles.css?v=20260429c">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="scanlines" aria-hidden="true"></div>
    <main id="app" class="app-root">
      <section class="boot-card panel">
        <p class="eyebrow">BOOT_SEQUENCE</p>
        <h1>assisKent // Mini App</h1>
        <p class="boot-copy">Загружаю расписание, дедлайны, напоминания и таймеры...</p>
      </section>
    </main>
    <div id="toast" class="toast" hidden></div>
  </div>
  <script>
    window.addEventListener("error", function (event) {
      var app = document.getElementById("app");
      if (!app) return;
      app.innerHTML =
        '<section class="boot-card panel">' +
        '<p class="eyebrow">FRONTEND_ERROR</p>' +
        '<h1>Mini App не загрузился</h1>' +
        '<p class="boot-copy">' + (event.message || "Ошибка в клиентском коде.") + '</p>' +
        '</section>';
    });
  </script>
  <script type="module" src="/miniapp/app.js?v=20260429b"></script>
</body>
</html>
